# Release devdns on every pushed tag: cross-compile, publish a GitHub release,
# and update the Homebrew tap formula (see .goreleaser.yaml).
#
# Requires a repository secret HOMEBREW_TAP_TOKEN: a Personal Access Token with
# write access to <owner>/homebrew-tap. GITHUB_TOKEN (auto-provided) creates the
# release in this repo.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
